{% extends "base.html" %}

{% block title %}Browse - Reading List{% endblock %}

{% block content %}
<header>
    <h1>Tufts Greek Reading List Reader</h1>
    <p class="reference">See full list <a href="https://as.tufts.edu/classicalstudies/resources/ma-classics-reading-lists">here</a>.</p>
</header>

<div class="content">
    <h2>Browse by author and work</h2>
    <p>Enter an author's name and the work that you'd like to read.</p>

    <form method="post" action="/browse" style="margin: 30px 0;">
        <div style="display: flex; gap: 10px; max-width: 500px;">
            <input 
                type="text" 
                name="author" 
                placeholder="Aeschylus"
                required
                style="flex: 1; padding: 12px; font-size: 1em; border: 2px solid #8b4513; border-radius: 4px;"
            >
            <input 
                type="text" 
                name="work" 
                placeholder="Eumenides"
                required
                style="flex: 1; padding: 12px; font-size: 1em; border: 2px solid #8b4513; border-radius: 4px;"
            >
            <button 
                type="submit" 
                class="nav-button"
                style="padding: 12px 24px; margin: 0; white-space: nowrap;"
            >
                Browse
            </button>
        </div>
    </form>

</div>
{% endblock %}
